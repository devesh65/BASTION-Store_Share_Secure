<!DOCTYPE html>
<html>
<head>
    <title>Upload File</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 40px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 400px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input[type="file"] {
            width: 100%;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

    </style>

</head>
<body>

<div class="box">

<h2>Upload File</h2>

<form method="POST"
      action="{% url 'upload_file' %}"
      enctype="multipart/form-data">

    {% csrf_token %}

    <input type="file" name="file" required>

    <button type="submit">Upload</button>

</form>

<br>

<a href="{% url 'file_list' %}">Back to My Files</a>

</div>

</body>
</html>
