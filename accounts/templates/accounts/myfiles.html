<!DOCTYPE html>
<html>
<head>
    <title>My Files</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .upload-btn {
            padding: 10px 15px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        .view-btn {
            background: #3498db;
            color: white;
            padding: 6px 10px;
            text-decoration: none;
            border-radius: 4px;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            padding: 6px 10px;
            text-decoration: none;
            border-radius: 4px;
        }

    </style>
</head>
<body>

<div style="margin-bottom:15px;">

<a href="{% url 'dashboard' %}" class="btn" style="
background:#2c3e50;
color:white;
padding:8px 15px;
text-decoration:none;
border-radius:5px;
margin-right:10px;
">
← Dashboard
</a>

<a href="{% url 'upload_file' %}" class="btn" style="
background:green;
color:white;
padding:8px 15px;
text-decoration:none;
border-radius:5px;
">
Upload New File
</a>

</div>
<table>

<tr>
<th>ID</th>
<th>File Name</th>
<th>Size</th>
<th>Upload Time</th>
<th>Actions</th>
</tr>

{% for file in files %}

<tr>

<td>{{ file.id }}</td>

<td>{{ file.file_name }}</td>

<td>{{ file.file_size }} bytes</td>

<td>{{ file.upload_time }}</td>

<td>

<a href="{{ file.file_url }}" target="_blank" class="view-btn">
View
</a>

<a href="{% url 'delete_file' file.id %}" class="delete-btn">
Delete
</a>

</td>

</tr>

{% empty %}

<tr>
<td colspan="5">No files uploaded yet</td>
</tr>

{% endfor %}

</table>

</body>
</html>
