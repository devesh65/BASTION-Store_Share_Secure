{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>My Files</title>

<link rel="stylesheet" href="{% static 'accounts/css/dashboard.css' %}">

<style>
.container{
    width:90%;
    margin:auto;
    margin-top:30px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#212529;
    color:white;
}

.btn{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    text-decoration:none;
    color:white;
}

.view{
    background:#17a2b8;
}

.delete{
    background:#dc3545;
}
</style>

</head>
<body>

<div class="container">

<h2>My Files</h2>

<a href="{% url 'upload_file' %}" class="btn view">Upload New File</a>

<br><br>

<table>

<tr>
<th>ID</th>
<th>File Name</th>
<th>Size</th>
<th>Upload Time</th>
<th>Actions</th>
</tr>

{% for file in files %}

<tr>

<td>{{ file.id }}</td>

<td>{{ file.file_name }}</td>

<td>{{ file.file_size }} bytes</td>

<td>{{ file.upload_time }}</td>

<td>

<a href="{{ file.file_url }}" target="_blank" class="btn view">
View
</a>

<form action="{% url 'delete_file' file.id %}" method="POST" style="display:inline;">
{% csrf_token %}
<button type="submit" class="btn delete">
Delete
</button>
</form>

</td>

</tr>

{% empty %}

<tr>
<td colspan="5">No files found</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
